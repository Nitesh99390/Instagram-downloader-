<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d62976">
    <title>Pro IG Downloader</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; color: #ffffff;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 35px 25px; text-align: center; width: 100%; max-width: 420px;
            margin-top: 40px;
        }

        h2 { font-size: 30px; margin-bottom: 5px; color: #d62976; font-weight: 700; }
        .subtitle { font-size: 14px; margin-bottom: 25px; color: #aaa; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; color: #fff; font-size: 15px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #d62976; background: rgba(255, 255, 255, 0.08); }

        .btn-main {
            background: #d62976; color: #fff; border: none; padding: 16px;
            border-radius: 14px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
            transition: 0.3s;
        }
        .btn-main:hover { background: #c12165; }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Media Preview Card */
        .preview-card {
            background: rgba(0,0,0,0.4); border-radius: 16px; padding: 15px;
            margin-top: 25px; display: none; text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .preview-img { width: 100%; border-radius: 10px; margin-bottom: 12px; max-height: 220px; object-fit: cover; }
        .preview-title { font-size: 13px; margin-bottom: 15px; color: #ddd; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn-download {
            background: #4CAF50; color: white; text-decoration: none; display: block;
            text-align: center; padding: 14px; border-radius: 12px; font-weight: bold;
            transition: 0.3s;
        }
        .btn-download:hover { background: #439a47; }
        
        #status-msg { margin-top: 15px; font-weight: bold; font-size: 14px; }

        /* Local History Section */
        .history-card {
            width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 20px;
            border-radius: 20px; margin-top: 25px; display: none;
        }
        .history-card h3 { font-size: 16px; margin-bottom: 10px; color: #ccc; text-align: left; }
        .history-item {
            font-size: 13px; padding: 12px; background: rgba(0,0,0,0.2);
            border-radius: 10px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .history-item a { color: #00ffcc; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="glass-container">
    <h2>IG Downloader</h2>
    <p class="subtitle">Download Reels & Videos instantly</p>
    
    <input type="text" id="ig-url" placeholder="Paste Instagram link here...">
    <button class="btn-main" id="fetchBtn" onclick="downloadMedia()">Get Video</button>
    
    <div id="status-msg"></div>

    <div class="preview-card" id="preview-box">
        <img id="thumb-img" class="preview-img" src="" alt="Thumbnail">
        <p id="video-title" class="preview-title"></p>
        <a id="dl-link" href="#" target="_blank" class="btn-download">⬇️ Download MP4</a>
    </div>
</div>

<div class="history-card" id="history-box">
    <h3>Recent Downloads</h3>
    <div id="history-list"></div>
</div>

<script>
    // 1. Download & UI Logic
    async function downloadMedia() {
        const urlInput = document.getElementById('ig-url').value.trim();
        const statusMsg = document.getElementById('status-msg');
        const fetchBtn = document.getElementById('fetchBtn');
        const previewBox = document.getElementById('preview-box');

        if(!urlInput.includes("instagram.com")) {
            statusMsg.innerHTML = "❌ Valid Instagram link paste karein!";
            statusMsg.style.color = "#ff4d4d"; return;
        }

        statusMsg.innerHTML = "⏳ Fetching video...";
        statusMsg.style.color = "#aaa";
        fetchBtn.disabled = true;
        previewBox.style.display = "none";

        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });
            
            const data = await response.json();
            if(data.error) throw new Error(data.error);

            let downloadLink = null;
            if (data && data[0] && data[0].urls && data[0].urls[0] && data[0].urls[0].url) {
                downloadLink = data[0].urls[0].url;
            }

            if(downloadLink) {
                statusMsg.innerHTML = "✅ Ready to Download!";
                statusMsg.style.color = "#4CAF50";
                
                document.getElementById('dl-link').href = downloadLink;
                
                const thumb = (data[0] && data[0].pictureUrl) ? data[0].pictureUrl : 'https://via.placeholder.com/400x200?text=Video+Ready';
                const title = (data[0] && data[0].meta && data[0].meta.title) ? data[0].meta.title : 'Instagram Reel';
                
                document.getElementById('thumb-img').src = thumb;
                document.getElementById('video-title').innerText = title;
                
                previewBox.style.display = "block";
                
                // History me save karein
                saveToLocalHistory(title, urlInput);
            } else {
                throw new Error("Download link format not found.");
            }
        } catch (error) {
            statusMsg.innerHTML = `❌ Error: ${error.message}`;
            statusMsg.style.color = "#ff4d4d";
        } finally {
            fetchBtn.disabled = false;
        }
    }

    // 2. Local Storage History Logic
    function saveToLocalHistory(title, url) {
        let history = JSON.parse(localStorage.getItem('ig_local_history')) || [];
        // Pehle se h toh skip ya unshift
        history.unshift({ title: title.substring(0, 35) + "...", url: url });
        if(history.length > 5) history.pop(); // Sirf top 5 items rkhne k liye
        localStorage.setItem('ig_local_history', JSON.stringify(history));
        loadLocalHistory();
    }

    function loadLocalHistory() {
        let history = JSON.parse(localStorage.getItem('ig_local_history')) || [];
        const box = document.getElementById('history-box');
        const list = document.getElementById('history-list');
        
        if(history.length > 0) {
            box.style.display = "block";
            list.innerHTML = history.map(item => `
                <div class="history-item">
                    <span>${item.title}</span>
                    <a href="${item.url}" target="_blank">Open Link</a>
                </div>
            `).join('');
        }
    }

    // 3. PWA Service Worker Register
    window.onload = () => {
        loadLocalHistory();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log("PWA Active!"))
                .catch(err => console.log(err));
        }
    };
</script>
</body>
</html>
