<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium IG Downloader</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Premium Instagram Style Gradient Background */
            background: linear-gradient(135deg, #4f5bd5 0%, #962fbf 25%, #d62976 50%, #fa7e1e 75%, #feda75 100%);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Setup */
        .glass-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            text-align: center;
            width: 100%;
            max-width: 460px;
            transition: all 0.4s ease;
        }

        .glass-container:hover {
            box-shadow: 0 16px 50px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        h2 { 
            color: #ffffff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Premium Glass Input */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* Stylish Button */
        button {
            background: #ffffff;
            color: #d62976;
            border: none;
            padding: 16px 25px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        button:hover { 
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.8);
            cursor: not-allowed;
            transform: none;
        }

        #result { 
            margin-top: 30px; 
            word-wrap: break-word;
        }

        /* Glass Download Button */
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #23d5ab, #23a6d5);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(35, 213, 171, 0.4);
            transition: all 0.3s ease;
            width: 100%;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(35, 213, 171, 0.6);
        }

        .error { 
            color: #ffdde1; 
            font-weight: 600;
            background: rgba(220, 53, 69, 0.2);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .loader { 
            color: #ffffff; 
            font-weight: 500;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        pre {
            text-align: left; 
            font-size: 11px; 
            background: rgba(0, 0, 0, 0.4); 
            color: #00ffcc;
            padding: 15px; 
            border-radius: 12px; 
            overflow-x: auto; 
            max-height: 180px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="glass-container">
    <h2>IG Downloader</h2>
    <p class="subtitle">Instagram Reels aur Videos ko ek click me download karein</p>
    
    <div class="input-group">
        <input type="text" id="ig-url" placeholder="Instagram link yahan paste karein...">
    </div>
    
    <button id="fetchBtn" onclick="downloadMedia()">Download Link Nikalein</button>
    <div id="result"></div>
</div>

<script>
    async function downloadMedia() {
        const urlInput = document.getElementById('ig-url').value.trim();
        const resultDiv = document.getElementById('result');
        const fetchBtn = document.getElementById('fetchBtn');

        if(!urlInput.includes("instagram.com")) {
            resultDiv.innerHTML = "<p class='error'>❌ Bhai, valid Instagram link paste karo!</p>";
            return;
        }

        resultDiv.innerHTML = "<p class='loader'>⏳ Video fetch ho raha hai, thoda sabr karein...</p>";
        fetchBtn.disabled = true;

        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });
            
            const data = await response.json();
            console.log("Response:", data);

            let downloadLink = null;

            // API Response check logic
            if (data && data[0] && data[0].urls && data[0].urls[0] && data[0].urls[0].url) {
                downloadLink = data[0].urls[0].url;
            } else if (data && data.url) {
                downloadLink = data.url;
            } else if (data && data.data && data.data[0] && data.data[0].url) {
                downloadLink = data.data[0].url; 
            } else if (data && data.video_url) {
                downloadLink = data.video_url;
            }

            if(downloadLink) {
                resultDiv.innerHTML = `
                    <p style="color: #ffffff; font-weight: bold; margin-bottom: 10px;">✅ Video Download Ke Liye Taiyar Hai!</p> 
                    <a href="${downloadLink}" target="_blank" class="download-btn">⬇️ Video Download Karein</a>
                `;
            } else {
                resultDiv.innerHTML = `
                    <p class='error'>❌ Link nahi mil paya. API ne format badal diya hai.</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            resultDiv.innerHTML = "<p class='error'>❌ Server down hai ya koi error aaya hai.</p>";
        } finally {
            fetchBtn.disabled = false;
        }
    }
</script>
</body>
</html>
