<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free Premium Instagram Video and Reel Downloader. Download high-quality IG videos instantly.">
    <meta name="keywords" content="Instagram downloader, ig saver, download reels, instagram video download">
    <title>Pro IG Downloader | Free Reels & Video Saver</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* Light/Dark Theme Variables */
        :root {
            --bg-gradient: linear-gradient(135deg, #4f5bd5 0%, #962fbf 25%, #d62976 50%, #fa7e1e 75%, #feda75 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.2);
            --card-border: rgba(255, 255, 255, 0.3);
        }

        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            --glass-bg: rgba(0, 0, 0, 0.6);
            --text-color: #e0e0e0;
            --input-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
            transition: all 0.5s ease;
        }

        @keyframes gradientAnimation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Theme Toggle */
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: var(--glass-bg); border: 1px solid var(--card-border);
            color: var(--text-color); padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-weight: bold; backdrop-filter: blur(10px);
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-radius: 24px; border: 1px solid var(--card-border);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.2);
            padding: 40px 30px; text-align: center; width: 100%; max-width: 460px;
            margin-top: 40px;
        }

        h2 { font-size: 32px; margin-bottom: 10px; }
        .subtitle { font-size: 14px; margin-bottom: 30px; opacity: 0.8; }

        input {
            width: 100%; padding: 16px; margin-bottom: 20px;
            background: var(--input-bg); border: 1px solid var(--card-border);
            border-radius: 14px; color: var(--text-color); font-size: 16px; outline: none;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.6); }

        .btn-main {
            background: #ffffff; color: #d62976; border: none; padding: 16px;
            border-radius: 14px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
        }
        .dark-mode .btn-main { background: #d62976; color: #fff; }

        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Preview Section */
        .preview-card {
            background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px;
            margin-top: 20px; display: none; text-align: left;
        }
        .preview-img { width: 100%; border-radius: 8px; margin-bottom: 10px; max-height: 250px; object-fit: cover; }
        .preview-title { font-size: 13px; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Action Buttons Grid */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-action {
            padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold;
            background: rgba(255,255,255,0.2); color: white;
        }
        .btn-download { background: #4CAF50; color: white; text-decoration: none; display: block; text-align: center; grid-column: span 2; }
        
        /* History Section */
        .history-section {
            margin-top: 30px; width: 100%; max-width: 460px;
            background: var(--glass-bg); padding: 20px; border-radius: 16px;
            display: none; border: 1px solid var(--card-border); backdrop-filter: blur(10px);
        }
        .history-item { font-size: 12px; margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; display: flex; justify-content: space-between;}
        .history-item a { color: #00ffcc; text-decoration: none; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>

<div class="glass-container">
    <h2>IG Downloader</h2>
    <p class="subtitle">Download Reels, Videos & Photos</p>
    
    <input type="text" id="ig-url" placeholder="Paste Instagram Link Here...">
    <button class="btn-main" id="fetchBtn" onclick="downloadMedia()">Download Link Nikalein</button>
    
    <div id="status-msg" style="margin-top: 15px; font-weight: bold;"></div>

    <div class="preview-card" id="preview-box">
        <img id="thumb-img" class="preview-img" src="" alt="Thumbnail">
        <p id="video-title" class="preview-title"></p>
        
        <div class="action-grid">
            <a id="dl-link" href="#" target="_blank" class="btn-action btn-download">⬇️ Download File</a>
            <button class="btn-action" onclick="copyLink()">📋 Copy Link</button>
            <button class="btn-action" onclick="shareLink()">📤 Share</button>
        </div>
    </div>
</div>

<div class="history-section" id="history-box">
    <h3>Recent Downloads</h3>
    <div id="history-list"></div>
</div>

<script>
    // Theme Toggle Logic
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const btn = document.querySelector('.theme-toggle');
        btn.innerText = document.body.classList.contains('dark-mode') ? "☀️ Light Mode" : "🌙 Dark Mode";
    }

    // Download & Parse Logic
    async function downloadMedia() {
        const urlInput = document.getElementById('ig-url').value.trim();
        const statusMsg = document.getElementById('status-msg');
        const fetchBtn = document.getElementById('fetchBtn');
        const previewBox = document.getElementById('preview-box');

        if(!urlInput.includes("instagram.com")) {
            statusMsg.innerHTML = "❌ Valid Instagram link paste karein!";
            statusMsg.style.color = "#ff4d4d"; return;
        }

        statusMsg.innerHTML = "⏳ Fetching... please wait";
        statusMsg.style.color = "#ffffff";
        fetchBtn.disabled = true;
        previewBox.style.display = "none";

        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });
            
            const data = await response.json();
            
            if(data.error) { throw new Error(data.error); }

            let downloadLink = null;
            if (data && data[0] && data[0].urls && data[0].urls[0] && data[0].urls[0].url) downloadLink = data[0].urls[0].url;

            if(downloadLink) {
                statusMsg.innerHTML = "✅ Ready!";
                statusMsg.style.color = "#4CAF50";
                
                // Set Preview Data
                document.getElementById('dl-link').href = downloadLink;
                document.getElementById('dl-link').setAttribute('data-url', downloadLink);
                
                // Try to get thumbnail and title from API response
                const thumb = (data[0] && data[0].pictureUrl) ? data[0].pictureUrl : 'https://via.placeholder.com/400x250?text=Instagram+Media';
                const title = (data[0] && data[0].meta && data[0].meta.title) ? data[0].meta.title : 'Instagram Video/Reel';
                
                document.getElementById('thumb-img').src = thumb;
                document.getElementById('video-title').innerText = title;
                
                previewBox.style.display = "block";
                
                saveToHistory(title, urlInput);
            } else {
                statusMsg.innerHTML = "❌ Link nahi mil paya.";
                statusMsg.style.color = "#ff4d4d";
            }
        } catch (error) {
            statusMsg.innerHTML = `❌ Error: ${error.message}`;
            statusMsg.style.color = "#ff4d4d";
        } finally {
            fetchBtn.disabled = false;
        }
    }

    // Share API
    function shareLink() {
        const url = document.getElementById('dl-link').getAttribute('data-url');
        if (navigator.share) {
            navigator.share({ title: 'IG Video', text: 'Downloaded via Pro IG Downloader', url: url });
        } else { alert("Share not supported on this browser."); }
    }

    // Copy to Clipboard
    function copyLink() {
        const url = document.getElementById('dl-link').getAttribute('data-url');
        navigator.clipboard.writeText(url);
        alert("Download Link Copied!");
    }

    // Local Storage History
    function saveToHistory(title, ogUrl) {
        let history = JSON.parse(localStorage.getItem('ig_history')) || [];
        history.unshift({ title: title.substring(0, 30) + "...", url: ogUrl });
        if(history.length > 5) history.pop(); // Keep only last 5
        localStorage.setItem('ig_history', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('ig_history')) || [];
        const historyBox = document.getElementById('history-box');
        const historyList = document.getElementById('history-list');
        
        if(history.length > 0) {
            historyBox.style.display = "block";
            historyList.innerHTML = history.map(item => 
                `<div class="history-item">
                    <span>${item.title}</span>
                    <a href="${item.url}" target="_blank">View Orig</a>
                </div>`
            ).join('');
        }
    }
    
    // Load history on start
    window.onload = loadHistory;
</script>
</body>
</html>
