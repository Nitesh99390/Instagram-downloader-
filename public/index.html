<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#dd2a7b">
<meta name="description" content="ReelSave Pro — Download Instagram Reels, Photos & Carousels.">
<title>ReelSave Pro</title>

<link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/120px-Instagram_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ════════════ GLOBAL RESET & VARS ════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#08080c;
  --bg-2:#0d0d12;
  --card:#15151c;
  --card-2:#1c1c25;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --text:#f5f5f7;
  --text-2:#c5c5cf;
  --muted:#7a7a85;
  --muted-2:#4a4a55;
  --ig-pink:#d62976;
  --ig-gradient:linear-gradient(135deg,#feda75 0%,#fa7e1e 25%,#d62976 50%,#962fbf 75%,#4f5bd5 100%);
  --green:#22c55e;
  --green-dark:#16a34a;
  --red:#ef4444;
  --blue:#3b82f6;
  --font:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
  --shadow-lg:0 20px 60px -10px rgba(214,41,118,0.25);
  --shadow-card:0 8px 32px -8px rgba(0,0,0,0.5);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 16px 60px;
  -webkit-font-smoothing:antialiased;
}

/* ════════════ NAV & HERO ════════════ */
.nav{
  width:100%;max-width:520px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:32px;
  padding:6px 4px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  font-size:19px;font-weight:800;
  letter-spacing:-0.02em;
}
.logo-icon{
  width:34px;height:34px;
  background:var(--ig-gradient);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.logo-text{
  background:var(--ig-gradient);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.stats-pill{
  font-size:12px;color:var(--text-2);
  background:var(--card);
  border:1px solid var(--border);
  padding:7px 14px;border-radius:999px;
  display:flex;align-items:center;gap:6px;
  font-weight:500;
}
.stats-pill span{color:var(--text);font-weight:700;}

.hero{
  width:100%;max-width:520px;
  text-align:center;
  margin-bottom:28px;
}
.hero h1{
  font-size:clamp(26px,7vw,36px);
  font-weight:800;
  line-height:1.2;
  margin-bottom:8px;
}
.hero h1 .accent{
  background:var(--ig-gradient);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ════════════ MAIN CARD ════════════ */
.main-card{
  width:100%;max-width:520px;
  background:linear-gradient(180deg,var(--card),var(--bg-2));
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:var(--shadow-card);
}
.input-wrap{
  position:relative;
  margin-bottom:14px;
  border-radius:14px;
  padding:1.5px;
  background:var(--card-2);
  transition:all 0.3s;
}
.input-wrap.focused{
  background:var(--ig-gradient);
  box-shadow:0 0 0 4px rgba(214,41,118,0.1);
}
.input-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--card-2);
  border-radius:12.5px;
  padding:0 8px 0 16px;
}
.input-icon{color:var(--muted);font-size:16px;}
.input-inner input{
  flex:1;min-width:0;
  background:transparent;
  border:none;outline:none;
  color:var(--text);
  font-family:var(--font);
  font-size:14px;font-weight:500;
  padding:16px 0;
}
.input-inner input::placeholder{color:var(--muted-2);}
.paste-btn,.clear-btn-x{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:16px;
  padding:8px;border-radius:8px;
  transition:all 0.2s;
}
.paste-btn:hover{color:var(--ig-pink);background:rgba(214,41,118,0.1);}
.clear-btn-x{display:none;}
.clear-btn-x.show{display:flex;}
.clear-btn-x:hover{color:var(--red);background:rgba(239,68,68,0.1);}

.type-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:999px;
  margin-bottom:14px;text-transform:uppercase;
}
.type-badge.reel{background:rgba(229,29,80,0.12);color:#ff6b8a;border:1px solid rgba(229,29,80,0.3);}
.type-badge.photo{background:rgba(250,126,30,0.12);color:#ffa867;border:1px solid rgba(250,126,30,0.3);}
.type-badge.carousel{background:rgba(150,47,191,0.15);color:#c98ce8;border:1px solid rgba(150,47,191,0.3);}
.type-badge.story{background:rgba(79,91,213,0.15);color:#8890e8;border:1px solid rgba(79,91,213,0.3);}
.type-badge.hidden{display:none;}

.btn-fetch{
  width:100%;padding:17px;
  border:none;border-radius:14px;
  font-family:var(--font);font-size:15px;font-weight:700;
  cursor:pointer;position:relative;overflow:hidden;
  background:var(--ig-gradient);color:#fff;
  transition:all 0.25s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-fetch:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px -6px rgba(214,41,118,0.6);}
.btn-fetch:disabled{opacity:0.6;cursor:not-allowed;}
.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════ PREVIEW CARD ════════════ */
.preview-card{
  width:100%;max-width:520px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;overflow:hidden;
  margin-bottom:18px;display:none;
}
.preview-thumb{position:relative;width:100%;background:#0a0a0e;aspect-ratio:16/10;overflow:hidden;}
.preview-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 60%);}
.thumb-meta{position:absolute;bottom:14px;left:16px;right:16px;display:flex;gap:10px;}
.thumb-type-tag{
  font-size:11px;font-weight:700;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);
  color:#fff;padding:5px 10px;border-radius:8px;
}
.preview-info{padding:20px;}
.preview-title{font-size:14px;font-weight:500;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.quality-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.quality-btn{
  flex:1;min-width:90px;padding:11px 8px;
  border-radius:11px;border:1.5px solid var(--border-strong);
  background:var(--card-2);color:var(--text-2);
  font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.quality-btn.selected{
  border-color:var(--ig-pink);
  background:linear-gradient(135deg,rgba(214,41,118,0.15),rgba(150,47,191,0.1));
  color:#fff;
}
.quality-btn:disabled{opacity:0.35;cursor:not-allowed;}
.quality-label{font-size:10px;font-weight:500;opacity:0.65;}

.dl-row{display:flex;gap:10px;}
.btn-dl{
  flex:1;padding:14px 12px;border-radius:12px;
  border:none;font-family:var(--font);font-size:13.5px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  text-decoration:none;transition:all 0.2s;
}
.btn-dl.primary{background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;}
.btn-dl.secondary{background:var(--card-2);color:var(--text-2);border:1.5px solid var(--border-strong);flex:0 0 auto;padding:14px 16px;}

/* ════════════ HISTORY ════════════ */
.history-section{width:100%;max-width:520px;display:none;margin-bottom:18px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 4px;}
.section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:14px;background:var(--ig-gradient);border-radius:2px;}
.clear-btn{
  font-size:12px;color:var(--muted);background:var(--card);
  border:1px solid var(--border);cursor:pointer;
  padding:6px 12px;border-radius:8px;font-weight:600;
}
.history-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
}
.hist-thumb{width:52px;height:52px;border-radius:11px;object-fit:cover;background:var(--card-2);flex-shrink:0;}
.hist-thumb-placeholder{
  width:52px;height:52px;border-radius:11px;background:var(--ig-gradient);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;
}
.hist-info{flex:1;min-width:0;}
.hist-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.hist-time{font-size:11px;color:var(--muted);}
.hist-link{
  font-size:12px;font-weight:700;color:var(--ig-pink);
  text-decoration:none;padding:6px 10px;border-radius:8px;
  background:rgba(214,41,118,0.08);
}

/* ════════════ TOAST & STATUS ════════════ */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--card-2);border:1px solid var(--border-strong);
  border-radius:14px;padding:13px 20px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:10px;transition:all 0.35s;
  z-index:9999;opacity:0;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success .toast-icon{color:var(--green);}
.toast.error .toast-icon{color:var(--red);}
.toast.info .toast-icon{color:var(--blue);}
.status-msg{font-size:13px;text-align:center;margin-top:14px;min-height:18px;color:var(--muted);font-weight:500;}

/* ════════════ FOOTER ════════════ */
.footer{margin-top:20px;text-align:center;font-size:11.5px;color:var(--muted-2);max-width:520px;}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo">
    <div class="logo-icon">🎬</div>
    <span class="logo-text">ReelSave Pro</span>
  </div>
  <div class="stats-pill">
    Saved: <span id="counter">0</span>
  </div>
</nav>

<div class="hero">
  <h1>Save <span class="accent">Instagram</span><br>content instantly</h1>
</div>

<div class="main-card">
  <div class="input-wrap" id="inputWrap">
    <div class="input-inner">
      <span class="input-icon">🔗</span>
      <input type="url" id="ig-url" placeholder="Paste Instagram link here..." autocomplete="off" autocorrect="off" spellcheck="false" inputmode="url">
      <button class="clear-btn-x" id="clearBtnX" onclick="clearInput()" title="Clear">✕</button>
      <button class="paste-btn" onclick="pasteFromClipboard()" title="Paste">📋</button>
    </div>
  </div>

  <div class="type-badge hidden" id="typeBadge"></div>

  <button class="btn-fetch" id="fetchBtn" onclick="downloadMedia()">
    <span id="btnIcon">⬇️</span>
    <span id="btnText">Get Video</span>
  </button>
  <div class="status-msg" id="statusMsg"></div>
</div>

<div class="preview-card" id="previewCard">
  <div class="preview-thumb" id="thumbWrap" style="display:none">
    <img id="thumbImg" src="" alt="Preview" onerror="this.style.display='none'">
    <div class="thumb-overlay"></div>
    <div class="thumb-meta">
      <div class="thumb-type-tag" id="thumbTypeTag">🎬 Media</div>
    </div>
  </div>
  <div class="preview-info">
    <p class="preview-title" id="videoTitle"></p>

    <div class="quality-row" id="qualityRow">
      <button class="quality-btn selected" data-q="hd" onclick="selectQuality(this)">
        HD 1080p <span class="quality-label">Best</span>
      </button>
      <button class="quality-btn" data-q="sd" onclick="selectQuality(this)">
        SD 720p <span class="quality-label">Smaller</span>
      </button>
      <button class="quality-btn" data-q="audio" onclick="selectQuality(this)">
        🎵 Audio <span class="quality-label">MP3</span>
      </button>
    </div>

    <div class="dl-row">
      <a id="dlLink" href="#" target="_blank" rel="noopener" class="btn-dl primary" onclick="onDownloadClick()">⬇️ Download</a>
      <button class="btn-dl secondary" onclick="copyLink()" title="Copy link">🔗</button>
    </div>
  </div>
</div>

<div class="history-section" id="historySection">
  <div class="section-header">
    <span class="section-title">Recent downloads</span>
    <button class="clear-btn" onclick="clearHistory()">🗑️ Clear</button>
  </div>
  <div id="historyList"></div>
</div>

<div class="footer">
  © ReelSave Pro · For personal use only<br>
  Not affiliated with Instagram™
</div>

<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<script>
let downloadLinks = { hd: null, sd: null, audio: null };
let selectedQuality = 'hd';
let toastTimer = null;
let currentMediaType = 'video';

function getCounter(){return parseInt(localStorage.getItem('rs_count')||'0');}
function incCounter(){
  const n=getCounter()+1;
  localStorage.setItem('rs_count',n);
  document.getElementById('counter').textContent=n;
}
document.getElementById('counter').textContent=getCounter();

const urlInput=document.getElementById('ig-url');
const inputWrap=document.getElementById('inputWrap');
const clearBtnX=document.getElementById('clearBtnX');

urlInput.addEventListener('focus',()=>inputWrap.classList.add('focused'));
urlInput.addEventListener('blur',()=>inputWrap.classList.remove('focused'));
urlInput.addEventListener('keydown',e=>{if(e.key==='Enter')downloadMedia();});
urlInput.addEventListener('input',()=>{
  detectType();
  clearBtnX.classList.toggle('show',urlInput.value.length>0);
});

function clearInput(){
  urlInput.value='';
  detectType();
  clearBtnX.classList.remove('show');
  urlInput.focus();
}

async function pasteFromClipboard(){
  try{
    const text=await navigator.clipboard.readText();
    if(text){
      urlInput.value=text;
      detectType();
      clearBtnX.classList.add('show');
      showToast('info','📋','Link pasted!');
    }
  }catch(e){
    showToast('error','❌','Please paste manually.');
  }
}

function detectType(){
  const v=urlInput.value.trim();
  const badge=document.getElementById('typeBadge');
  if(v.includes('/reel/')||v.includes('/reels/')){
    badge.className='type-badge reel';badge.innerHTML='🎬 Reel';
    currentMediaType='reel';
  } else if(v.includes('/stories/')){
    badge.className='type-badge story';badge.innerHTML='📖 Story';
    currentMediaType='story';
  } else if(v.includes('/p/')){
    badge.className='type-badge carousel';badge.innerHTML='🖼️ Post';
    currentMediaType='post';
  } else if(v.includes('instagram.com')){
    badge.className='type-badge photo';badge.innerHTML='📷 Link detected';
    currentMediaType='photo';
  } else {
    badge.className='type-badge hidden';
    currentMediaType='video';
  }
}

function selectQuality(btn){
  if(btn.disabled)return;
  document.querySelectorAll('.quality-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedQuality=btn.dataset.q;
  updateDownloadLink();
}

function updateDownloadLink(){
  const link=document.getElementById('dlLink');
  const url=downloadLinks[selectedQuality]||downloadLinks.hd||downloadLinks.sd||'#';
  link.href=url;
}

async function downloadMedia(){
  const url=urlInput.value.trim();
  const btn=document.getElementById('fetchBtn');
  const btnText=document.getElementById('btnText');
  const btnIcon=document.getElementById('btnIcon');
  const status=document.getElementById('statusMsg');
  const previewCard=document.getElementById('previewCard');

  if(!url || !url.includes('instagram.com')){
    showToast('error','❌','Please paste a valid Instagram link.');
    return;
  }

  btn.disabled=true;
  btnText.textContent='Fetching...';
  btnIcon.innerHTML='<span class="spinner"></span>';
  status.textContent='🔍 Analyzing link...';
  previewCard.style.display='none';

  try{
    const res=await fetch('/api/download',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);

    const urls=data?.[0]?.urls||[];
    downloadLinks={hd:null,sd:null,audio:null};
    urls.forEach((u,i)=>{
      if(i===0)downloadLinks.hd=u.url;
      else if(i===1)downloadLinks.sd=u.url;
      if(u.type==='audio'||u.ext==='mp3')downloadLinks.audio=u.url;
    });
    if(!downloadLinks.sd&&downloadLinks.hd)downloadLinks.sd=downloadLinks.hd;
    if(!downloadLinks.hd&&downloadLinks.sd)downloadLinks.hd=downloadLinks.sd;

    if(!downloadLinks.hd)throw new Error('Could not extract link.');

    const sdBtn=document.querySelector('[data-q="sd"]');
    sdBtn.style.display=(downloadLinks.hd===downloadLinks.sd)?'none':'';

    const thumb=data?.[0]?.pictureUrl||null;
    const title=data?.[0]?.meta?.title||'Instagram media';
    const imgEl=document.getElementById('thumbImg');

    const tagMap={reel:'🎬 Reel',story:'📖 Story',post:'🖼️ Post',photo:'📷 Photo',video:'🎬 Video'};
    document.getElementById('thumbTypeTag').textContent=tagMap[currentMediaType]||'🎬 Media';

    if(thumb){
      imgEl.src=thumb;
      imgEl.style.display='block';
      document.getElementById('thumbWrap').style.display='block';
    } else {
      document.getElementById('thumbWrap').style.display='none';
    }

    document.getElementById('videoTitle').textContent=title;
    document.querySelector('[data-q="hd"]').click();
    updateDownloadLink();

    const audioBtn=document.querySelector('[data-q="audio"]');
    if(downloadLinks.audio){
      audioBtn.style.opacity='1';audioBtn.disabled=false;
    } else {
      audioBtn.style.opacity='0.35';audioBtn.disabled=true;
    }

    previewCard.style.display='block';
    status.textContent='';
    showToast('success','✅','Ready to download!');
    saveHistory(title,url,thumb);

  }catch(err){
    status.textContent='⚠️ Failed to fetch.';
    showToast('error','❌',err.message||'Something went wrong.');
  }finally{
    btn.disabled=false;
    btnText.textContent='Get Video';
    btnIcon.textContent='⬇️';
  }
}

function onDownloadClick(){
  if(document.getElementById('dlLink').href.endsWith('#'))return;
  incCounter();
  showToast('success','⬇️','Download started!');
}

function copyLink(){
  const url=document.getElementById('dlLink').href;
  if(url.endsWith('#')){showToast('error','❌','No link yet.');return;}
  navigator.clipboard.writeText(url).then(()=>{showToast('success','🔗','Link copied!');}).catch(()=>{});
}

function saveHistory(title,url,thumb){
  let h=JSON.parse(localStorage.getItem('rs_history')||'[]');
  if(!h.some(i=>i.url===url)){
    h.unshift({title:title.substring(0,50),url,thumb,time:Date.now(),type:currentMediaType});
    if(h.length>10)h=h.slice(0,10);
    localStorage.setItem('rs_history',JSON.stringify(h));
  }
  renderHistory();
}

function renderHistory(){
  const h=JSON.parse(localStorage.getItem('rs_history')||'[]');
  const section=document.getElementById('historySection');
  if(!h.length){section.style.display='none';return;}
  section.style.display='block';
  document.getElementById('historyList').innerHTML=h.map(item=>{
    const typeIcon={reel:'🎬',story:'📖',post:'🖼️',photo:'📷'}[item.type]||'🎬';
    const thumbHtml=item.thumb
      ?`<img class="hist-thumb" src="${item.thumb}" loading="lazy" onerror="this.outerHTML='<div class=&quot;hist-thumb-placeholder&quot;>${typeIcon}</div>'">`
      :`<div class="hist-thumb-placeholder">${typeIcon}</div>`;
    return`<div class="history-item">
      ${thumbHtml}
      <div class="hist-info">
        <div class="hist-title">${item.title.replace(/</g,'&lt;')}</div>
        <div class="hist-time">🕒 Just now</div>
      </div>
      <a href="${item.url}" target="_blank" class="hist-link">Open</a>
    </div>`;
  }).join('');
}

function clearHistory(){
  localStorage.removeItem('rs_history');
  renderHistory();
  showToast('info','🗑️','History cleared.');
}

function showToast(type,icon,msg){
  clearTimeout(toastTimer);
  const toast=document.getElementById('toast');
  document.getElementById('toastIcon').textContent=icon;
  document.getElementById('toastMsg').textContent=msg;
  toast.className='toast '+type+' show';
  toastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
}

window.addEventListener('load',()=>{
  renderHistory();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  
  // Smart auto-paste with length limit to avoid pasting HTML code
  urlInput.addEventListener('focus',async function autoCheck(){
    if(urlInput.value)return;
    try{
      const text=await navigator.clipboard.readText();
      if(text && text.length < 500 && text.includes('instagram.com')){
        urlInput.value=text;
        detectType();
        clearBtnX.classList.add('show');
        showToast('info','✨','Auto-pasted!');
      }
    }catch(e){}
    urlInput.removeEventListener('focus',autoCheck);
  });
});
</script>
</body>
</html>
