<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d62976">
    <title>Pro IG Downloader with Auth</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; color: #ffffff;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px; text-align: center; width: 100%; max-width: 400px;
            margin-top: 50px;
        }

        h2 { font-size: 28px; margin-bottom: 5px; color: #d62976; }
        .subtitle { font-size: 14px; margin-bottom: 25px; color: #aaa; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: #fff; font-size: 15px; outline: none;
        }

        .btn-main {
            background: #d62976; color: #fff; border: none; padding: 15px;
            border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
            margin-bottom: 10px;
        }
        
        .btn-sec {
            background: transparent; color: #aaa; border: 1px solid #444; padding: 10px;
            border-radius: 12px; cursor: pointer; width: 100%; font-size: 14px;
        }

        /* Views management */
        #auth-view { display: block; }
        #downloader-view { display: none; }

        .user-badge {
            font-size: 12px; color: #4CAF50; background: rgba(76, 175, 80, 0.1);
            padding: 5px 10px; border-radius: 20px; display: inline-block; margin-bottom: 15px;
        }

        .preview-card {
            background: rgba(0,0,0,0.4); border-radius: 12px; padding: 15px;
            margin-top: 20px; display: none; text-align: left;
        }
        .preview-img { width: 100%; border-radius: 8px; margin-bottom: 10px; max-height: 200px; object-fit: cover; }
        .preview-title { font-size: 13px; margin-bottom: 15px; color: #ddd; }
        .btn-download {
            background: #4CAF50; color: white; text-decoration: none; display: block;
            text-align: center; padding: 12px; border-radius: 10px; font-weight: bold;
        }
        
        #status-msg, #auth-msg { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="glass-container" id="auth-view">
    <h2>Welcome Back</h2>
    <p class="subtitle">Please Login to use IG Downloader</p>
    
    <input type="email" id="auth-email" placeholder="Enter Email ID">
    <input type="password" id="auth-password" placeholder="Enter Password">
    
    <button class="btn-main" onclick="handleLogin()">Login</button>
    <button class="btn-sec" onclick="handleSignup()">Naya Account Banayein (Signup)</button>
    
    <div id="auth-msg"></div>
</div>

<div class="glass-container" id="downloader-view">
    <h2>IG Downloader</h2>
    <div id="user-display" class="user-badge"></div>
    <p class="subtitle">Download Reels & Videos instantly</p>
    
    <input type="text" id="ig-url" placeholder="Paste link here...">
    <button class="btn-main" id="fetchBtn" onclick="downloadMedia()">Get Video</button>
    
    <button class="btn-sec" style="margin-top: 10px;" onclick="handleLogout()">Logout</button>
    
    <div id="status-msg"></div>

    <div class="preview-card" id="preview-box">
        <img id="thumb-img" class="preview-img" src="" alt="Thumbnail">
        <p id="video-title" class="preview-title"></p>
        <a id="dl-link" href="#" target="_blank" class="btn-download">⬇️ Download MP4</a>
    </div>
</div>

<script>
    let supabase = null;
    let currentUserEmail = null;

    // Server se keys lekar Supabase Init karna
    async function initSupabase() {
        try {
            const res = await fetch('/api/config');
            const config = await res.json();
            supabase = supabase.createClient(config.supabaseUrl, config.supabaseKey);
            
            // Check active session
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                showDownloader(session.user.email);
            }
        } catch (err) {
            console.error("Supabase load error:", err);
        }
    }

    // UI Switching
    function showDownloader(email) {
        currentUserEmail = email;
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('downloader-view').style.display = 'block';
        document.getElementById('user-display').innerText = `Logged in: ${email}`;
    }

    function showAuth() {
        currentUserEmail = null;
        document.getElementById('auth-view').style.display = 'block';
        document.getElementById('downloader-view').style.display = 'none';
    }

    // Auth Operations
    async function handleLogin() {
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;
        const msg = document.getElementById('auth-msg');

        msg.innerHTML = "⏳ Logging in..."; msg.style.color = "#fff";

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            msg.innerHTML = `❌ ${error.message}`; msg.style.color = "#ff4d4d";
        } else {
            msg.innerHTML = "✅ Success!";
            showDownloader(data.user.email);
        }
    }

    async function handleSignup() {
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;
        const msg = document.getElementById('auth-msg');

        if(password.length < 6) {
            msg.innerHTML = "❌ Password kam se kam 6 characters ka hona chahiye!";
            msg.style.color = "#ff4d4d"; return;
        }

        msg.innerHTML = "⏳ Creating Account..."; msg.style.color = "#fff";

        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
            msg.innerHTML = `❌ ${error.message}`; msg.style.color = "#ff4d4d";
        } else {
            msg.innerHTML = "✅ Account Created! Aap ab Login kar sakte hain.";
            msg.style.color = "#4CAF50";
        }
    }

    async function handleLogout() {
        await supabase.auth.signOut();
        showAuth();
    }

    // Download Handler
    async function downloadMedia() {
        const urlInput = document.getElementById('ig-url').value.trim();
        const statusMsg = document.getElementById('status-msg');
        const fetchBtn = document.getElementById('fetchBtn');
        const previewBox = document.getElementById('preview-box');

        if(!urlInput.includes("instagram.com")) {
            statusMsg.innerHTML = "❌ Valid Instagram link paste karein!";
            statusMsg.style.color = "#ff4d4d"; return;
        }

        statusMsg.innerHTML = "⏳ Fetching video...";
        statusMsg.style.color = "#aaa";
        fetchBtn.disabled = true;
        previewBox.style.display = "none";

        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput, email: currentUserEmail })
            });
            
            const data = await response.json();
            if(data.error) throw new Error(data.error);

            let downloadLink = null;
            if (data && data[0] && data[0].urls && data[0].urls[0] && data[0].urls[0].url) {
                downloadLink = data[0].urls[0].url;
            }

            if(downloadLink) {
                statusMsg.innerHTML = "✅ Ready to Download!";
                statusMsg.style.color = "#4CAF50";
                document.getElementById('dl-link').href = downloadLink;
                
                const thumb = (data[0] && data[0].pictureUrl) ? data[0].pictureUrl : 'https://via.placeholder.com/400x200?text=Video+Ready';
                const title = (data[0] && data[0].meta && data[0].meta.title) ? data[0].meta.title : 'Instagram Reel';
                
                document.getElementById('thumb-img').src = thumb;
                document.getElementById('video-title').innerText = title.substring(0, 50) + "...";
                previewBox.style.display = "block";
            } else {
                throw new Error("Link format changed by API.");
            }
        } catch (error) {
            statusMsg.innerHTML = `❌ Error: ${error.message}`;
            statusMsg.style.color = "#ff4d4d";
        } finally {
            fetchBtn.disabled = false;
        }
    }

    // Load Service Worker & Init App
    window.onload = () => {
        initSupabase();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log(err));
        }
    };
</script>
</body>
</html>
